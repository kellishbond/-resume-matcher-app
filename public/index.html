<!DOCTYPE html>
<html lang="en">
<head>
    <!-- 🚨 CRITICAL FOR MOBILE: Tells the phone to render at actual width -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Matcher</title>
    <style>
        /* Modern Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f4f5f7; 
            color: #333; 
            line-height: 1.6;
            padding: 20px 15px; /* Slightly less padding on mobile */
        }
        
        /* Main Container */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px; /* Adjusted for mobile */
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            /* Prevents long URLs from breaking the layout on small screens */
            overflow-wrap: break-word; 
            word-wrap: break-word;
        }
        
        h2 {
            margin-bottom: 20px;
            color: #111;
            font-size: 22px; /* Slightly smaller on mobile */
        }

        /* Textareas */
        textarea {
            width: 100%;
            padding: 15px;
            /* 🚨 CRITICAL FOR MOBILE: 16px prevents iOS from auto-zooming when typing */
            font-size: 16px; 
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            resize: vertical;
            font-family: inherit;
        }
        textarea:focus {
            outline: none;
            border-color: #007bff;
        }

        /* Button */
        button {
            background-color: #111827;
            color: white;
            border: none;
            padding: 14px 24px; /* A bit taller for easy mobile tapping */
            font-size: 16px;    /* Also 16px for mobile tap targets */
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background-color: #374151; }

        /* Results Section */
        #results {
            margin-top: 30px;
            padding: 20px;
            background: #f8fafc;
            border-left: 4px solid #007bff;
            border-radius: 4px;
            display: none;
            font-size: 15px;
        }
        #results h3 { margin-top: 15px; color: #111; font-size: 18px; }
        #results ul { margin-left: 20px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Resume vs JD Analyzer</h2>
        
        <textarea id="resume" rows="8" placeholder="Paste Resume Text Here..."></textarea>
        
        <textarea id="jd" rows="8" placeholder="Paste Job Description Here..."></textarea>
        
        <button onclick="analyze()">Analyze Match</button>
        <div id="results"></div>
    </div>

    <script>
        async function analyze() {
            const resumeText = document.getElementById('resume').value;
            const jdText = document.getElementById('jd').value;
            const resultsDiv = document.getElementById('results');
            
            if(!resumeText || !jdText) {
                resultsDiv.style.display = "block";
                resultsDiv.innerHTML = "<p style='color:red;'>Please paste both a Resume and a Job Description.</p>";
                return;
            }

            resultsDiv.style.display = "block";
            resultsDiv.innerHTML = "Analyzing... (If the server is sleeping, this might take 30-50 seconds on the first try)";

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resumeText, jdText })
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();
                
                const skillsList = (data.aiMissingSkills || []).map(s => `<li>${s}</li>`).join('');
                
                resultsDiv.innerHTML = `
                    <h3>Logic Match Score: ${data.logicScore}%</h3>
                    <p>(Matched ${data.matchedKeywords} out of ${data.totalKeywords} core keywords)</p>
                    
                    <h3>AI Missing Skills:</h3>
                    <ul>${skillsList || '<li>None identified</li>'}</ul>
                    
                    <h3>AI Summary:</h3>
                    <p>${data.aiSummary}</p>
                `;
            } catch (error) {
                resultsDiv.innerHTML = `<p style="color: red;">Error: ${error.message}. The server might be waking up. Please try again in 30 seconds.</p>`;
            }
        }
    </script>
</body>
</html>
