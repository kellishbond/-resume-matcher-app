<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Matcher</title>
    <style>
    /* Modern Reset */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        background-color: #f4f5f7; 
        color: #333; 
        line-height: 1.6;
        padding: 40px 20px;
    }
    
    /* Main Container */
    .container {
        max-width: 800px;
        margin: 0 auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    
    h2 {
        margin-bottom: 20px;
        color: #111;
        font-size: 24px;
    }

    /* Textareas */
    textarea {
        width: 100%;
        padding: 15px;
        font-size: 14px;
        border: 1px solid #ddd;
        border-radius: 8px;
        margin-bottom: 20px;
        resize: vertical;
        font-family: inherit;
    }
    textarea:focus {
        outline: none;
        border-color: #007bff;
    }

    /* Button */
    button {
        background-color: #111827; /* Sleek dark button */
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 500;
        width: 100%;
        transition: background 0.2s;
    }
    button:hover { background-color: #374151; }

    /* Results Section */
    #results {
        margin-top: 30px;
        padding: 20px;
        background: #f8fafc;
        border-left: 4px solid #007bff;
        border-radius: 4px;
    }
    #results h3 { margin-top: 15px; color: #111; }
    #results ul { margin-left: 20px; margin-top: 5px; }
</style>
</head>
<div class="container">
<body style="font-family: Arial; padding: 20px; max-width: 800px; margin: auto;">
    <h2>Resume vs JD Analyzer</h2>
    
    <textarea id="resume" rows="8" cols="80" placeholder="Paste Resume Text Here..."></textarea><br><br>
    
    <textarea id="jd" rows="8" cols="80" placeholder="Paste Job Description Here..."></textarea><br><br>
    
    <button onclick="analyze()">Analyze Match</button>
    <div id="results" style="margin-top: 20px;"></div>
     </div>

    <script>
        async function analyze() {
            const resumeText = document.getElementById('resume').value;
            const jdText = document.getElementById('jd').value;
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = "Analyzing with Groq... (This will be fast!)";

            const response = await fetch('http://localhost:3000/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ resumeText, jdText })
            });

            const data = await response.json();
            
            resultsDiv.innerHTML = `
                <h3>Logic Match Score: ${data.logicScore}%</h3>
                <p>(Matched ${data.matchedKeywords} out of ${data.totalKeywords} core keywords)</p>
                
                <h3>AI Missing Skills:</h3>
                <ul>${data.aiMissingSkills.map(s => `<li>${s}</li>`).join('')}</ul>
                
                <h3>AI Summary:</h3>
                <p>${data.aiSummary}</p>
            `;
        }
    </script>
</body>
</html>
